<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Flex</title>
    <style>
      .container {
        display: flex;
        min-height: 100vh;
        align-items: stretch;
        color: white;
        text-align: center;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        width: 100vw;
      }

      .navegacao {
        background-color: orangered;
        width: 300px;
        padding: 20px;
      }

      .cabecalho {
        background-color: blue;
        height: 100px;
        padding: 20px;
      }

      .conteudo {
        background-color: purple;
        flex-grow: 1;
        padding: 20px;
      }

      .rodape {
        background-color: blue;
        height: 100px;
        padding: 20px;
      }
      .tres {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="navegacao">NAVEGAÇÃO</div>
      <div class="tres">
        <div class="cabecalho">CABEÇALHO</div>
        <div class="conteudo">CONTEÚDO</div>
        <div class="rodape">RODAPÉ</div>
      </div>
    </div>
  </body>
</html>
