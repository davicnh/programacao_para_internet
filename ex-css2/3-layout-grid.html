<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Layout</title>
    <style>
      .container {
        font-family: "Impact", "Arial Black", sans-serif;
        font-size: 2.5rem;
        font-weight: 900;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 10px;
        color: black;
        text-align: center;
        height: 100vh;
        padding: 10px;
        grid-template-areas:
          "b1 b1 b1"
          "b2 b3 b4"
          "b5 b3 b6"
          "b5 b7 b7";
      }

      .orange {
        background-color: orange;
      }

      .violet {
        background-color: violet;
      }

      #n1 {
        grid-area: b1;
      }

      #n2 {
        grid-area: b2;
      }

      #n3 {
        grid-area: b3;
      }

      #n4 {
        grid-area: b4;
      }

      #n5 {
        grid-area: b5;
      }

      #n6 {
        grid-area: b6;
      }

      #n7 {
        grid-area: b7;
      }
      .container div {
        padding: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="orange" id="n1">1</div>
      <div class="violet" id="n2">2</div>
      <div class="orange" id="n3">3</div>
      <div class="violet" id="n4">4</div>
      <div class="orange" id="n5">5</div>
      <div class="violet" id="n6">6</div>
      <div class="orange" id="n7">7</div>
    </div>
  </body>
</html>
