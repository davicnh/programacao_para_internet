<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Screen</title>
    <style>
        .container {
            display: grid;
            height: 100vh;
            grid-template-areas:
                "b1 b1 b2"
                "b4 b3 b2"
                "b4 b5 b6";
            gap: 10px;
        }

        .n1 {
            background-color: blue;
            grid-area: b1;
        }

        .n2 {
            background-color: red;
            grid-area: b2;
        }

        .n3 {
            background-color: yellow;
            grid-area: b3;
        }

        .n4 {
            background-color: green;
            grid-area: b4;
        }

        .n5 {
            background-color: blueviolet;
            grid-area: b5;
        }

        .n6 {
            background-color: violet;
            grid-area: b6;
        }

        @media screen and (max-width: 500px) {
            .container {
                grid-template-areas:
                    "b1"
                    "b2"
                    "b3"
                    "b4"
                    "b5"
                    "b6";
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="n1"></div>
        <div class="n2"></div>
        <div class="n3"></div>
        <div class="n4"></div>
        <div class="n5"></div>
        <div class="n6"></div>
    </div>
</body>

</html>
