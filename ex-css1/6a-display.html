<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6A/Display</title>
    <style>
      .p {
        text-align: center;
        line-height: 180px;
        margin: 0%;
      }
      #p1 {
        background-color: blue;
      }
      #p2 {
        background-color: green;
      }
      #p3 {
        background-color: red;
      }
      #p4 {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <p id="p1" class="p">1</p>
    <p id="p2" class="p">2</p>
    <p id="p3" class="p">3</p>
    <p id="p4" class="p">4</p>
  </body>
</html>
