<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeira Holanda</title>
    <style>
        .container{
            border: 1px solid black;
            height: 400px;
            width: 400px;
        }
        .bandeira{
            height: 33.33%;
            margin: 0;
        }
        #vermelho{
            background-color: red;
        }
        #branco{
            background-color: white;
        }
        #azul{
            background-color: blue;
        }   
    </style>
</head>
<body>
    <div class="container">
    <p id="vermelho" class="bandeira"></p>
    <p id="branco" class="bandeira"></p>
    <p id="azul" class="bandeira"></p>
    </div>
</body>
</html>
