<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolinhas</title>
    <style>
        .container{
            height: 400px;
            width: 400px;
            border: 1px solid black;
            position: relative;
        }
        .p{
            border-radius: 50%;
            position: absolute;
            background-color: violet;
            height: 70px;
            width: 70px;
            margin: 0;
        }
        #p1{
            top: 10px;
            left: 10px;
        }
        #p2{
            top: 10px;
            right: 10px;
        }
        #p3{
            bottom: 10px;
            left: 10px;
        }
        #p4{
            bottom: 10px;
            right: 10px;
        }
        #p5{
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
     <div class="container">
        <p id="p1" class="p"></p>
        <p id="p2" class="p"></p>
        <p id="p3" class="p"></p>
        <p id="p4" class="p"></p>
        <p id="p5" class="p"></p>
    </div>
</body>
</html>
