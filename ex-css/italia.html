<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeira Italia</title>
    <style>
        .bandeira{
            width: 400px;
            height: 400px;
            border: 1px solid black;
            display: flex;
            margin: 0;
        }
        #verde{
            background-color: green;
            flex: 1;
            margin: 0;
        }
        #branco{
            background-color: white;
            flex: 1;
            margin: 0;
        }
        #vermelho{
            background-color: red;
            flex: 1;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="bandeira">
        <p id="verde"></p>
        <p id="branco"></p>
        <p id="vermelho"></p>
    </div>
</body>
</html>
