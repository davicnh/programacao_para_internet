<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeira Japão</title>
    <style>
        .container{
            height: 400px;
            width: 400px;
            position: relative;
            border: 1px solid black;
            background-color: white;
        }
        #um{
            position: absolute;
            background-color: red;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 50%;
            width: 150px;
            height: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <p id="um"></p>
    </div>
</body>

</html>
