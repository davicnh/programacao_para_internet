<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6C/Display</title>
    <style>
        .container{
            position: relative;
            height: 400px;
            width: 400px;
            border: 1px solid black;
            margin: 0;
        }
        .p{
            position: absolute;
            height: 80px;
            width: 80px;
            text-align: center;
            margin: 0;
        }
        #p1{
            background-color: blue;
            top: 10px;
            left: 10px;
        }
        #p2{
            background-color: red;
            bottom: 10px;
            left: 10px;
        }
        #p3{
            background-color: green;
            top: 10px;
            right: 10px;
        }
        #p4{
            background-color: yellow;
            bottom: 10px;
            right: 10px;
        }
        #p5{
            background-color: palevioletred;
            top: 155px;
            left: 155px;
        }
    </style>
</head>

<body>
    <div class="container">
        <p id="p1" class="p">1</p>
        <p id="p2" class="p">2</p>
        <p id="p3" class="p">3</p>
        <p id="p4" class="p">4</p>
        <p id="p5" class="p">5</p>
    </div>
</body>
</html>
