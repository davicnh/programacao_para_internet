<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Números Aleatórios</title>
  </head>
  <body>
    <h1>Sorteio de Números</h1>

    <h2>Mínimo:</h2>
    <input type="number" id="minimo" />

    <h2>Máximo:</h2>
    <input type="number" id="maximo" /><br />

    <br /><button onclick="sortear()">Sortear</button>
    <ul id="resultado"></ul>

    <script>
      let historico = [];
      function sortear() {
        let min;
        let max;

        min = parseFloat(document.getElementById("minimo").value);
        max = parseFloat(document.getElementById("maximo").value);

        let numero = Math.floor(Math.random() * (max - min + 1)) + min;

        let encontrado = historico.find((item) => item.numero === numero);

        if (!encontrado) {
          historico.push({ numero: numero, vezes: 1 });
        } else {
          encontrado.vezes++;
        }

        let lista = document.getElementById("resultado");
        lista.innerHTML = "";
        historico.forEach((item) => {
          lista.innerHTML +=
            "<li>Número " +
            item.numero +
            " — sorteado " +
            item.vezes +
            " vez(es)</li>";
        });
      }
    </script>
  </body>
</html>
