<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Base</title>
  </head>
  <body>
    <button id="alertButton" onclick="botao()">Clique aqui</button>
    <input type="text" id="textInput" placeholder="Digite algo" />
    <div id="hoverDiv">Passe o mouse aqui</div>
    <select id="colorSelect">
      <option value="">Escolha uma cor</option>
      <option value="blue">Azul</option>
      <option value="green">Verde</option>
      <option value="red">Vermelho</option>
    </select>

    <script>
      function botao() {
        alert("Isso é um alerta!");
      }

      let input = document.getElementById("textInput");
      input.addEventListener("keydown", function (e) {
        console.log(e.key);
      });

      input.addEventListener("focus", function () {
        input.style.backgroundColor = "yellow";
      });

      input.addEventListener("blur", function () {
        input.style.backgroundColor = "white";
      });

      let mouse = document.getElementById("hoverDiv");
      mouse.addEventListener("mouseover", function () {
        mouse.style.backgroundColor = "blue";
      });

      mouse.addEventListener("mouseout", function () {
        mouse.style.backgroundColor = "white";
      });

      let select = document.getElementById("colorSelect");
      select.addEventListener("change", function () {
        let cor = select.value;
        document.body.style.backgroundColor = cor;
      });
    </script>
  </body>
</html>
