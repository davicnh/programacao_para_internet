<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <style>
      body {
        justify-content: center;
        align-items: center;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
      }
      h1 {
        text-align: center;
      }

      .container {
        border: 1px solid black;
        width: 500px;
      }

      .display {
        text-align: right;
        padding: 15px;
        background-color: white;
        font-size: 32px;
        border: 1px solid black;
        margin: 10px;
      }

      .botoes {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-flow: dense;
        border-radius: 4px;
        gap: 5px;
        padding: 10px;
      }

      .botoes button {
        border: 1px solid #ccc;
        font-size: 20px;
        height: 80px;
        cursor: pointer;
        background-color: white;
      }

      .botoes button.igual {
        grid-row: span 4;
        background-color: blue;
        color: white;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Calculadora</h1>

    <div class="container">
      <div class="display">0</div>
      <div class="botoes">
        <button class="escurinho">+</button>
        <button class="escurinho">-</button>
        <button class="escurinho">*</button>
        <button class="escurinho">/</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="igual">=</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>0</button>
        <button>.</button>
        <button>C</button>
      </div>
    </div>

    <script>
      let display = document.querySelector(".display");
      let botoes = document.querySelectorAll(".botoes button");

      botoes.forEach(function (botao) {
        botao.addEventListener("click", function () {
          let valor = botao.textContent;

          if (valor === "C") {
            display.textContent = "0";
          } else if (valor === "=") {
            display.textContent = eval(display.textContent);
          } else {
            if (display.textContent === "0") {
              display.textContent = valor;
            } else {
              display.textContent += valor;
            }
          }
        });
      });
    </script>
  </body>
</html>
