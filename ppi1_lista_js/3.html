<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMC</title>
  </head>
  <body>
    <h1>Cálculo de IMC</h1>

    <h2>Digite seu nome:</h2>
    <input id="nome" type="text" />

    <h2>Digite o seu peso:</h2>
    <input type="number" id="peso" step="0.1" />

    <h2>Digite sua altura:</h2>
    <input type="number" id="altura" step="0.01" /><br />

    <br /><button onclick="calcular()">Calcular</button>

    <p id="resultadoIMC"></p>
    <p id="classificacao"></p>

    <img id="imgPerfil" />

    <script>
      function calcular() {
        let nome = document.getElementById("nome").value;
        let peso = parseFloat(document.getElementById("peso").value);
        let altura = parseFloat(document.getElementById("altura").value);

        if (nome == "" || isNaN(peso) || isNaN(altura)) {
          alert("Preencha todos os campos!");
          return;
        }

        let imc = peso / (altura * altura);

        document.getElementById("resultadoIMC").innerHTML =
          "Nome: " + nome + " | IMC: " + imc.toFixed(2);

        let classificacao;
        if (imc < 18.5) {
          classificacao = "Abaixo do peso.";
        } else if (imc >= 18.5 && imc < 24.9) {
          classificacao = "Peso normal.";
        } else if (imc >= 25 && imc < 29.9) {
          classificacao = "Sobrepeso.";
        } else if (imc >= 30 && imc < 34.9) {
          classificacao = "Obesidade grau 1.";
        } else if (imc >= 35 && imc < 39.9) {
          classificacao = "Obesidade grau 2.";
        } else if (imc >= 40) {
          classificacao = "Obesidade grau 3 (mórbida).";
        }

        document.getElementById("classificacao").innerHTML =
          "Classificação = " + classificacao;

        switch (true) {
          case imc < 18.5:
            document.getElementById("imgPerfil").src = "magro.png";
            break;
          case imc < 24.9:
            document.getElementById("imgPerfil").src = "normal.png";
            break;
          case imc < 29.9:
            document.getElementById("imgPerfil").src = "sobrepeso.png";
            break;
          case imc < 34.9:
            document.getElementById("imgPerfil").src = "obeso1.png";
            break;
          case imc < 39.9:
            document.getElementById("imgPerfil").src = "obeso2.png";
            break;
          default:
            document.getElementById("imgPerfil").src = "obeso3.png";
            break;
        }
      }
    </script>
  </body>
</html>
