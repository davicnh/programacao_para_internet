<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        #container {
            height: 400px;
            width: 400px;
            border: 1px solid magenta;
            position: relative;
        }
        #container>* {
            display: block;
            border: 1px solid black;
            width: 100px;
            height: 100px;
        }
        #box1 {
            position: relative;
            left: 200px;
        } 
        #box2 {
            position: fixed;
            left: 0px;
            bottom: 0px;
            background-color: magenta;
        }
        #box3 {
            position: absolute;
        }
    </style>
</head>
<body>

    <div>
        <h1>Positions</h1>
    </div>

    <div id="container">
        <div id="box1">box1</div>
        <div id="box2">box2</div>
        <div id="box3">box3</div>
        <div id="box4">box4</div>
        <div id="box5">box5</div>
    </div>

</body>
</html>
