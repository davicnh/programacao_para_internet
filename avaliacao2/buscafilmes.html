<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca de Filmes</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }
      .resultados {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 20px;
        color: white;
        justify-content: center;
      }
      .resultados div {
        width: 200px;
        background: #16213e;
        border-radius: 8px;
        overflow: hidden;
        text-align: center;
        padding-bottom: 10px;
      }

      .resultados img {
        width: 200px;
        height: 300px;
        object-fit: cover;
      }
      .pesquisa {
        text-align: center;
        justify-content: center;
      }
      h1 {
        text-align: center;
      }
      input {
        padding: 8px 12px;
        border-radius: 4px;
        margin-right: 8px;
      }

      button {
        padding: 8px 16px;
        background: #16213e;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      h1,
      h2 {
        margin: 10px;
      }
      body {
        text-align: center;
        padding: 40px 20px;
      }
      .resultados div p {
        padding: 5px 8px;
      }
    </style>
  </head>
  <body>
    <h1>Busca de Filmes</h1>

    <h2>Nome do filme:</h2>
    <input type="text" id="digite" />
    <br /><br /><button onclick="buscarFilme()">Pesquisar</button>
    <div class="resultados"></div>

    <script>
      function buscarFilme() {
        let buscar = document.getElementById("digite").value;
        let url = "http://www.omdbapi.com/?apikey=4a3b711b&s=" + buscar;
        let resultados = document.querySelector(".resultados");
        resultados.innerHTML = "";
        fetch(url)
          .then((resposta) => resposta.json())
          .then((dados) => {
            dados.Search.forEach((filme) => {
              let item = document.createElement("div");
              item.innerHTML = "<img src='" + filme.Poster + "'>" + filme.Title;
              resultados.appendChild(item);
              let urlDetalhes =
                "http://www.omdbapi.com/?apikey=4a3b711b&i=" + filme.imdbID;
              fetch(urlDetalhes)
                .then((resposta) => resposta.json())
                .then((detalhes) => {
                  item.innerHTML += "<p>Gênero: " + detalhes.Genre + "</p>";
                  item.innerHTML += "<p>Diretor: " + detalhes.Director + "</p>";
                });
            });
          });
      }
    </script>
  </body>
</html>
